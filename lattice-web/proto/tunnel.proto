syntax = "proto3";

package lattice.web;

// WebSocket tunnel envelope — used only by lattice-web.

// Browser → server
message WsRequest {
  uint64 id = 1;
  string service = 2;
  string method = 3;
  bytes payload = 4;
  bool server_streaming = 5;
}

// Server → browser
message WsResponse {
  uint64 id = 1;
  bytes payload = 2;
  string error = 3;
  bytes stream = 4;
  bool stream_end = 5;
}
