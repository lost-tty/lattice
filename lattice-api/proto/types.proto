syntax = "proto3";

package lattice.daemon.v1;

// ============================================================================
// Core DTO Types - Single source of truth for all Lattice types
// ============================================================================

message Empty {}

// ============================================================================
// Node Types
// ============================================================================

message NodeStatus {
  bytes public_key = 1;
  string display_name = 2;
  string data_path = 3;
  uint32 mesh_count = 4;
}

message SetNameRequest {
  string name = 1;
}

message StoreTypeList {
  repeated string items = 1;
}

// ============================================================================
// Event Types
// ============================================================================

message NodeEvent {
  reserved 1; // mesh_ready
  oneof node_event {
    StoreReadyEvent store_ready = 2;
    JoinFailedEvent join_failed = 3;
    SyncResultEvent sync_result = 4;
  }
}

message StoreReadyEvent {
  bytes root_id = 1;
  bytes store_id = 2;
}

message JoinFailedEvent {
  bytes root_id = 1;
  string reason = 2;
}

message SyncResultEvent {
  bytes store_id = 1;
  uint32 peers_synced = 2;
  uint64 entries_sent = 3;
  uint64 entries_received = 4;
}

// ============================================================================
// Store Types
// ============================================================================

message ListStoreRequest {
  optional bytes parent_id = 1;
}

message JoinRequest {
  string token = 1;
}

message JoinResponse {
  bytes store_id = 1;
}

message InviteToken {
  string token = 1;
}

message PeerInfo {
  bytes public_key = 1;
  string status = 2;
  bool online = 3;
  string name = 4;
  uint64 last_seen_ms = 5;
  uint64 added_at = 6;
}

message PeerList {
  repeated PeerInfo items = 1;
}

message RevokePeerRequest {
  bytes store_id = 1;
  bytes peer_key = 2;
}

// ============================================================================
// Store Types
// ============================================================================

message StoreId {
  bytes store_id = 1;
}

message CreateStoreRequest {
  optional bytes parent_id = 1;
  string name = 2;
  string store_type = 3;
}

message SetStoreNameRequest {
  bytes store_id = 1;
  string name = 2;
}

message DeleteStoreRequest {
  bytes store_id = 1;
  bytes child_id = 2;
}

message StoreNameResponse {
  optional string name = 1;
}

message PeerStrategyResponse {
  optional string strategy = 1;
}

// Store reference
message StoreRef {
  bytes id = 1;
  string store_type = 2;
  string name = 3;
  bool archived = 4;
}

// Store metadata
message StoreMeta {
  bytes id = 1;
  string store_type = 2;
  uint64 schema_version = 4;
}

// List of store references
message StoreList {
  repeated StoreRef items = 1;
}

// Runtime statistics
message StoreDetails {
  uint32 author_count = 1;
  uint64 intention_count = 2;
  uint64 witness_count = 3;
  uint64 last_applied_seq = 4;
  bytes last_applied_hash = 5;
  uint64 witness_head_seq = 6;
  bytes witness_head_hash = 7;
}

message SyncResult {
  uint32 peers_synced = 1;
  uint64 entries_sent = 2;
  uint64 entries_received = 3;
}

message WitnessLogRequest {
  bytes store_id = 1;
}

// Causal dependency condition — mirrors kernel's Condition enum.
message Condition {
  oneof kind {
    CausalDeps v1 = 1;  // Explicit causal dependencies (AND logic)
  }
}

message CausalDeps {
  repeated bytes hashes = 1;  // Sorted list of prerequisite intention hashes
}

message HLC {
  uint64 wall_time = 1;  // Milliseconds since Unix epoch
  uint32 counter = 2;    // Logical counter for same-ms ordering
}

// Intention — user-facing API representation.
// Ops are resolved to S-expressions. No raw bytes or signatures.
message Intention {
  bytes hash = 1;               // blake3 content hash (32 bytes)
  bytes author = 2;             // Ed25519 public key (32 bytes)
  HLC timestamp = 4;            // Hybrid logical clock
  bytes store_prev = 6;         // Previous intention hash in author's chain
  Condition condition = 7;      // Causal dependency condition
  repeated SExpr ops = 8;       // Resolved operations
}

// Transport wrapper: weaver.WitnessRecord + sequence number.
// content/signature fields mirror weaver.proto WitnessRecord exactly.
message WitnessLogEntry {
  uint64 seq = 1;
  bytes intention_hash = 2;     // blake3 of the witnessed intention
  bytes signature = 3;
  bytes hash = 4;               // blake3(content) — the chain hash
  uint64 wall_time = 5;         // Wall-clock time when witnessed (Unix ms)
  bytes prev_hash = 6;          // Hash of previous witness entry (zeros for first)
}

// Structured s-expression for operation summaries.
message SExpr {
  oneof value {
    string symbol = 1;  // Unquoted symbol/keyword: put, child-add, :active
    string str = 2;     // Quoted string value
    bytes raw = 3;      // Binary data (rendered as hex)
    uint64 num = 4;     // Numeric value
    SExprList list = 5; // Nested list: (put "key" "value")
  }
}

message SExprList {
  repeated SExpr items = 1;
}

message WitnessLogResponse {
  repeated WitnessLogEntry items = 1;
}

message FloatingIntention {
  Intention intention = 1;
  uint64 received_at = 2;   // Wall-clock time when received (Unix ms)
}

message FloatingIntentionsResponse {
  repeated FloatingIntention items = 1;
}

message GetIntentionRequest {
  bytes store_id = 1;
  bytes hash_prefix = 2;
}

message GetIntentionResponse {
  Intention intention = 1;
}

message AuthorStateRequest {
  bytes store_id = 1;
  bytes author_key = 2;
}

message AuthorState {
  bytes public_key = 1;
  bytes hash = 2;
  optional uint64 witness_seq = 3;
  optional string peer_status = 4;
  optional string peer_name = 5;
}

message AuthorStateResponse {
  repeated AuthorState items = 1;
}

message AuthorStateObservation {
  bytes observer = 1;
  bytes observed_author = 2;
  uint64 seen = 3;
}

message AuthorPeerInfo {
  bytes public_key = 1;
  optional string peer_status = 2;
  optional string peer_name = 3;
}

message AuthorIntentionCount {
  bytes author = 1;
  uint64 count = 2;
}

message AuthorStateObservationsResponse {
  repeated AuthorStateObservation items = 1;
  repeated AuthorPeerInfo observers = 2;
  repeated AuthorPeerInfo columns = 3;
  repeated AuthorIntentionCount author_totals = 4;
}

message AckDeltaEntry {
  bytes author = 1;
  bytes tip_hash = 2;
  uint64 tip_count = 3;
  uint64 acknowledged_count = 4;
}

message AckDeltaResponse {
  repeated AckDeltaEntry entries = 1;
}

message EmitAckResponse {
  bytes intention_hash = 1;
  repeated AckDeltaEntry entries = 2;
}

message CleanupResult {
  uint32 orphans_removed = 1;
}

message SystemEntry {
  string key = 1;
  bytes value = 2;
}

message SystemListResponse {
  repeated SystemEntry items = 1;
}

// ============================================================================
// Branch Inspection Types
// ============================================================================

// Request: given a set of head hashes, inspect their branching structure.
message InspectBranchRequest {
  bytes store_id = 1;
  repeated bytes heads = 2;     // 2+ head hashes (32 bytes each)
}

// One branch: the path from LCA (inclusive) to head (inclusive).
message BranchPath {
  bytes head = 1;                    // The head hash this branch reaches
  repeated bytes hashes = 2;        // Intention hashes in topo order (oldest first, head last)
}

// Response: LCA + per-head branch paths.
message InspectBranchResponse {
  bytes lca = 1;                // Lowest common ancestor hash (32 bytes, or empty if disjoint)
  repeated BranchPath branches = 2;
}

// ============================================================================
// App Binding Types
// ============================================================================

message AppBindingProto {
  string subdomain = 1;
  string app_id = 2;
  bytes store_id = 3;
  bytes registry_store_id = 4;
  bool enabled = 5;
}

message AppBindingList {
  repeated AppBindingProto items = 1;
}

message ToggleAppRequest {
  string subdomain = 1;
  bool enabled = 2;
  bytes registry_store_id = 3;  // UUID bytes — which root store the app belongs to
}

message RegisterAppRequest {
  bytes registry_store_id = 1;
  string subdomain = 2;
  string app_id = 3;
  bytes store_id = 4;          // empty = auto-create child KV store
}

message RemoveAppRequest {
  bytes registry_store_id = 1;
  string subdomain = 2;
}

message UploadBundleRequest {
  bytes registry_store_id = 1;
  // app_id removed — server reads from manifest.toml inside zip
  bytes data = 3;
}

message UploadBundleResponse {
  string app_id = 1;           // app_id extracted from manifest
}

message RemoveBundleRequest {
  bytes registry_store_id = 1;
  string app_id = 2;
}

message BundleInfo {
  string app_id = 1;
  bytes registry_store_id = 2;
}

message BundleList {
  repeated BundleInfo bundles = 1;
}

// ============================================================================
// Dynamic Store Types
// ============================================================================

message ExecRequest {
  bytes store_id = 1;
  string method = 2;
  bytes payload = 3;
}

enum ErrorCode {
  UNKNOWN = 0;
  STORE_NOT_FOUND = 1;
  METHOD_NOT_FOUND = 2;
  INVALID_ARGUMENT = 3;
  EXECUTION_FAILED = 4;
}

message ExecResponse {
  bytes result = 1;
  string error = 2;
  ErrorCode error_code = 3;
}

message DescriptorResponse {
  bytes file_descriptor_set = 1;
  string service_name = 2;
}

enum MethodKind {
  COMMAND = 0;
  QUERY = 1;
}

message MethodInfo {
  string name = 1;
  string description = 2;
  MethodKind kind = 3;
}

message MethodList {
  repeated MethodInfo items = 1;
}

// ============================================================================
// Stream Subscription Types
// ============================================================================

// Descriptor for a subscribable event stream
message StreamDescriptor {
  string name = 1;
  string description = 2;
  string param_schema = 3;   // Proto message name for params (if any)
  string event_schema = 4;   // Proto message name for events
}

message StreamList {
  repeated StreamDescriptor items = 1;
}

// Subscribe to a store stream
message SubscribeRequest {
  bytes store_id = 1;
  string stream_name = 2;
  bytes params = 3;  // Encoded stream-specific params
}

// Event from a store stream
message StoreEvent {
  bytes payload = 1;  // Encoded stream event
}
