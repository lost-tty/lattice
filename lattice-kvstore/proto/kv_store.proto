syntax = "proto3";
package lattice.kv;

// The Key-Value Store Service
service KvStore {
    rpc Put (PutRequest) returns (PutResponse);
    rpc Get (GetRequest) returns (GetResponse);
    rpc Delete (DeleteRequest) returns (DeleteResponse);
    rpc List (ListRequest) returns (ListResponse);
    rpc Batch (BatchRequest) returns (BatchResponse);
    rpc Inspect (InspectRequest) returns (InspectResponse);
}

// --- Batch Operations ---

message BatchRequest {
    repeated Operation ops = 1;
}

message BatchResponse {
    bytes hash = 1;  // Entry hash of the atomic batch
}

// --- Service Request/Response ---

message PutRequest {
    bytes key = 1;
    bytes value = 2;
}

message PutResponse {
    bytes hash = 1;
}

message GetRequest {
    bytes key = 1;
}

message GetResponse {
    optional bytes value = 1;
    bool conflicted = 2;  // true when heads.len() > 1 (concurrent writes exist)
}

message InspectRequest {
    bytes key = 1;
}

message InspectResponse {
    bytes key = 1;                // Echo back the key
    bool exists = 2;              // true if the key has any state (value or tombstone)
    optional bytes value = 3;     // LWW winner value (None for tombstone / missing)
    bool tombstone = 4;           // true if the winner is a delete
    bool conflicted = 5;          // true when heads.len() > 1
    repeated bytes heads = 6;     // Intention hashes of all heads (heads[0] = winner)
    uint32 head_count = 7;        // Convenience: heads.len()
}

message DeleteRequest {
    bytes key = 1;
}

message DeleteResponse {
    bytes hash = 1;
}

message ListRequest {
    bytes prefix = 1;
}

message ListResponse {
    repeated KeyValuePair items = 1;
}

message KeyValuePair {
    bytes key = 1;
    bytes value = 2;
    bool conflicted = 3;  // true when heads.len() > 1 (concurrent writes exist)
}

// --- Payload Types (log entry format) ---

message PutOp {
    bytes key = 1;
    bytes value = 2;
}

message DeleteOp {
    bytes key = 1;
}

message Operation {
    oneof op_type {
        PutOp put = 1;
        DeleteOp delete = 2;
    }
}

message KvPayload {
    repeated Operation ops = 1;
}

// --- Stream Types (watch subscription) ---

// Parameters for the Watch stream
message WatchParams {
    bytes prefix = 1;  // Key prefix to filter events
}

// Wire format for watch events
message WatchEventProto {
    bytes key = 1;
    oneof kind {
        bytes value = 2;  // Update: the new LWW value
        bool deleted = 3; // Delete: key was removed (value ignored)
    }
}
